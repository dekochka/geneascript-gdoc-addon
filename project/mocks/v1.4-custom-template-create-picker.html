<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>v1.4 — Create from Template Picker</title>
<style>
body { font-family: Arial, sans-serif; font-size: 13px; margin: 0; padding: 16px; color: #333; display: flex; flex-direction: column; background: #fff; max-width: 420px; }

h2 { font-size: 15px; margin: 0 0 4px 0; }
.subtitle { font-size: 12px; color: #5f6368; margin-bottom: 16px; }

/* Template list */
.tpl-list { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }
.tpl-item { display: flex; align-items: center; gap: 8px; padding: 10px 12px; border: 2px solid #dadce0; border-radius: 6px; cursor: pointer; transition: all 0.15s; }
.tpl-item:hover { border-color: #1a73e8; }
.tpl-item.selected { border-color: #1a73e8; background: #e8f0fe; }
.tpl-item input[type=radio] { accent-color: #1a73e8; margin: 0; }
.tpl-item-body { flex: 1; }
.tpl-item-title { font-weight: bold; font-size: 13px; margin-bottom: 1px; }
.tpl-item-desc { font-size: 11px; color: #5f6368; }

/* Actions */
.actions { display: flex; gap: 8px; justify-content: flex-end; padding-top: 12px; border-top: 1px solid #eee; }
.btn { padding: 8px 20px; border-radius: 4px; font-size: 13px; cursor: pointer; border: 1px solid #dadce0; background: #fff; color: #333; }
.btn:hover { background: #f1f3f4; }
.btn-primary { background: #1a73e8; color: #fff; border-color: #1a73e8; }
.btn-primary:hover { background: #1765cc; }
</style>
</head>
<body>

<h2>Create from Template</h2>
<p class="subtitle">Choose a template to use as a starting point. All sections will be copied and can be customized.</p>

<div class="tpl-list">
  <label class="tpl-item selected" onclick="this.querySelector('input').checked=true; document.querySelectorAll('.tpl-item').forEach(i=>i.classList.remove('selected')); this.classList.add('selected');">
    <input type="radio" name="parent" value="galicia_gc" checked>
    <div class="tpl-item-body">
      <div class="tpl-item-title">Galician Greek Catholic (19th c.)</div>
      <div class="tpl-item-desc">Galicia (Austrian Empire) &middot; Greek Catholic &middot; Birth, Marriage, Death</div>
    </div>
  </label>

  <label class="tpl-item" onclick="this.querySelector('input').checked=true; document.querySelectorAll('.tpl-item').forEach(i=>i.classList.remove('selected')); this.classList.add('selected');">
    <input type="radio" name="parent" value="russian_orthodox">
    <div class="tpl-item-body">
      <div class="tpl-item-title">Russian Imperial Orthodox (Metricheskaya Kniga)</div>
      <div class="tpl-item-desc">Russian Empire &middot; Orthodox &middot; Birth, Marriage, Death</div>
    </div>
  </label>

  <label class="tpl-item" onclick="this.querySelector('input').checked=true; document.querySelectorAll('.tpl-item').forEach(i=>i.classList.remove('selected')); this.classList.add('selected');">
    <input type="radio" name="parent" value="generic_plain">
    <div class="tpl-item-body">
      <div class="tpl-item-title">Generic &mdash; verbatim text (letters, typescript, etc.)</div>
      <div class="tpl-item-desc">Any source &middot; N/A &middot; General manuscript or typescript</div>
    </div>
  </label>
</div>

<div class="actions">
  <button class="btn">Cancel</button>
  <button class="btn btn-primary">Create &amp; Edit</button>
</div>

</body>
</html>
