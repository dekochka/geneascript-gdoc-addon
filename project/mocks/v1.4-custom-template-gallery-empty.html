<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>v1.4 — Template Gallery — Empty My Templates</title>
<style>
body { font-family: Arial, sans-serif; font-size: 13px; margin: 0; padding: 16px; color: #333; display: flex; flex-direction: column; height: calc(100vh - 32px); background: #fff; max-width: 620px; }

.current-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
.current { font-size: 12px; color: #666; }
.current span { font-weight: bold; color: #1a73e8; }
.copy-icon-btn { display: inline-flex; align-items: center; gap: 4px; padding: 4px 8px; border-radius: 4px; font-size: 11px; cursor: pointer; border: 1px solid #dadce0; background: #fff; color: #5f6368; transition: all 0.15s; }
.copy-icon-btn:hover { border-color: #1a73e8; color: #1a73e8; background: #e8f0fe; }
.copy-icon-btn svg { width: 16px; height: 16px; fill: currentColor; }

.section-label { font-size: 11px; font-weight: bold; color: #5f6368; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
.section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
.section-counter { font-size: 11px; color: #5f6368; }

.cards { display: flex; flex-direction: column; gap: 8px; margin-bottom: 12px; }
.card { display: flex; align-items: flex-start; gap: 8px; border: 2px solid #dadce0; border-radius: 8px; padding: 12px; cursor: pointer; transition: border-color 0.15s; }
.card:hover { border-color: #1a73e8; }
.card.selected { border-color: #1a73e8; background: #e8f0fe; }
.card input[type=radio] { margin-top: 3px; accent-color: #1a73e8; }
.card-body { flex: 1; }
.card-title { font-weight: bold; font-size: 14px; margin-bottom: 2px; }
.card-meta { font-size: 11px; color: #5f6368; margin-bottom: 4px; }
.card-desc { font-size: 12px; color: #444; line-height: 1.4; }

.divider { border-top: 1px solid #dadce0; margin: 16px 0; }

/* Empty state */
.empty-state { text-align: center; padding: 20px 16px; color: #5f6368; }
.empty-state .icon { font-size: 28px; margin-bottom: 8px; opacity: 0.5; }
.empty-state p { font-size: 12px; margin: 0 0 12px 0; line-height: 1.5; }

.create-row { display: flex; gap: 8px; justify-content: center; }
.create-btn { padding: 10px 20px; border: 2px dashed #dadce0; border-radius: 8px; background: #f8f9fa; color: #1a73e8; font-size: 12px; cursor: pointer; font-weight: bold; transition: all 0.15s; text-align: center; }
.create-btn:hover { border-color: #1a73e8; background: #e8f0fe; }

.preview-toggle { background: none; border: none; color: #1a73e8; cursor: pointer; font-size: 12px; padding: 4px 0; margin-top: 12px; margin-bottom: 4px; text-decoration: underline; }

.options { margin-top: 12px; margin-bottom: 12px; }
.options label { font-size: 12px; cursor: pointer; display: flex; align-items: center; gap: 6px; }
.options .hint { font-size: 11px; color: #5f6368; margin-left: 22px; margin-top: 2px; }

.actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: auto; padding-top: 12px; border-top: 1px solid #eee; }
.btn { padding: 8px 20px; border-radius: 4px; font-size: 13px; cursor: pointer; border: 1px solid #dadce0; background: #fff; color: #333; }
.btn:hover { background: #f1f3f4; }
.btn-primary { background: #1a73e8; color: #fff; border-color: #1a73e8; }
.btn-primary:hover { background: #1765cc; }

.scroll-body { flex: 1; overflow-y: auto; }
</style>
</head>
<body>

<!-- Header -->
<div class="current-row">
  <div class="current">Currently using: <span>Galician Greek Catholic (19th c.)</span></div>
  <button class="copy-icon-btn" title="Copy exact prompt sent to Gemini API">
    <svg viewBox="0 0 24 24"><path d="M19 3h-4.18C14.4 1.84 13.3 1 12 1s-2.4.84-2.82 2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-7 0c.55 0 1 .45 1 1s-.45 1-1 1-1-.45-1-1 .45-1 1-1zm-2 14l-4-4 1.41-1.41L10 14.17l6.59-6.59L18 9l-8 8z"/></svg>
    <span>Copy prompt</span>
  </button>
</div>

<div class="scroll-body">

  <!-- Official Templates -->
  <div class="section-label">Official Templates</div>
  <div class="cards">
    <label class="card selected">
      <input type="radio" name="template" value="galicia_gc" checked>
      <div class="card-body">
        <div class="card-title">Galician Greek Catholic (19th c.)</div>
        <div class="card-meta">Galicia (Austrian Empire) &middot; Greek Catholic &middot; Birth, Marriage, Death</div>
        <div class="card-desc">Latin/Polish/Ukrainian registers from Galician Greek Catholic parishes. Column headers in Latin with Cyrillic equivalents.</div>
      </div>
    </label>

    <label class="card">
      <input type="radio" name="template" value="russian_orthodox">
      <div class="card-body">
        <div class="card-title">Russian Imperial Orthodox (Metricheskaya Kniga)</div>
        <div class="card-meta">Russian Empire &middot; Orthodox &middot; Birth, Marriage, Death</div>
        <div class="card-desc">Pre-reform Russian Cyrillic registers with Church Slavonic influence.</div>
      </div>
    </label>

    <label class="card">
      <input type="radio" name="template" value="generic_plain">
      <div class="card-body">
        <div class="card-title">Generic &mdash; verbatim text (letters, typescript, etc.)</div>
        <div class="card-meta">Any source &middot; N/A &middot; General manuscript or typescript</div>
        <div class="card-desc">Handwritten letters, typescript, diaries, notes, or any non-tabular text.</div>
      </div>
    </label>
  </div>

  <!-- Divider -->
  <div class="divider"></div>

  <!-- My Templates — Empty state -->
  <div class="section-header">
    <span class="section-label" style="margin-bottom:0">My Templates</span>
    <span class="section-counter">0 of 5</span>
  </div>

  <div class="empty-state">
    <div class="icon">&#128221;</div>
    <p>No custom templates yet.<br>Create one by cloning an official template or starting from scratch.</p>
  </div>

  <div class="create-row">
    <button class="create-btn">+ Create from Template</button>
    <button class="create-btn">+ Create Blank</button>
  </div>

  <!-- Preview toggle -->
  <button class="preview-toggle">&#9654; Review Template</button>

  <!-- Scaffold checkbox -->
  <div class="options">
    <label><input type="checkbox"> Scaffold missing Context fields from template</label>
    <div class="hint">Adds any missing field labels (e.g. VILLAGES, COMMON_SURNAMES) without overwriting existing values.</div>
  </div>
</div>

<!-- Bottom actions -->
<div class="actions">
  <button class="btn">Cancel</button>
  <button class="btn btn-primary">Apply</button>
</div>

</body>
</html>
