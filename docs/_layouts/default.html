<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="google-site-verification" content="LxKgGxOc0IIotol6pmpWyM1Ajhb48bS4lpH0_GWv-rk" />
  <link rel="icon" href="/GeneaScript_logo_128.png" type="image/png" />
  <title>{{ page.title | default: site.title }}</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; max-width: 900px; margin: 0 auto; padding: 1rem 2rem; line-height: 1.6; color: #222; }
    a { color: #0366d6; }
    img { max-width: 100%; }
    table { border-collapse: collapse; width: 100%; margin: 1rem 0; }
    th, td { border: 1px solid #ddd; padding: 0.5rem 0.75rem; text-align: left; }
    th { background: #f6f8fa; }
    pre { background: #f6f8fa; padding: 1rem; overflow-x: auto; border-radius: 6px; }
    code { font-size: 0.9em; }
    .site-footer { margin-top: 3rem; padding-top: 1rem; border-top: 1px solid #eee; font-size: 0.85rem; color: #666; }
  </style>
</head>
<body>
  <nav style="margin-bottom:1.5rem; font-size:0.9rem;">
    <a href="/">Home</a> &middot;
    <a href="/USER_GUIDE.html">User Guide</a> &middot;
    <a href="/INSTALLATION.html">Installation</a> &middot;
    <a href="/PRIVACY_POLICY.html">Privacy</a> &middot;
    <a href="/TERMS_OF_SERVICE.html">Terms</a> &middot;
    <a href="https://github.com/dekochka/geneascript-gdoc-addon">GitHub</a>
  </nav>

  {{ content }}

  <div class="site-footer">
    <p>Google, Google Docs, Google Drive, Google AI Studio, and Gemini are trademarks of Google LLC.</p>
    <p>Support: <a href="mailto:geneascript.support@gmail.com">geneascript.support@gmail.com</a></p>
  </div>

  <script type="module">
    import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs';
    mermaid.initialize({ startOnLoad: false, theme: 'default' });

    document.querySelectorAll('pre > code.language-mermaid').forEach(function(codeEl) {
      var pre = codeEl.parentElement;
      var div = document.createElement('div');
      div.className = 'mermaid';
      div.textContent = codeEl.textContent;
      pre.parentElement.replaceChild(div, pre);
    });

    mermaid.run();
  </script>
</body>
</html>
