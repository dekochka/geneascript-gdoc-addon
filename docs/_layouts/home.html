<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="google-site-verification" content="LxKgGxOc0IIotol6pmpWyM1Ajhb48bS4lpH0_GWv-rk" />
  <link rel="icon" href="/GeneaScript_logo_128.png" type="image/png" />
  <title>{{ page.title | default: "GeneaScript" }}</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; max-width: 720px; margin: 0 auto; padding: 2rem 1.5rem; line-height: 1.6; color: #222; }
    a { color: #0366d6; text-decoration: none; }
    a:hover { text-decoration: underline; }
    .lang-grid { display: flex; flex-wrap: wrap; gap: 0.75rem; margin: 1.5rem 0; }
    .lang-grid a { display: inline-block; padding: 0.6rem 1.2rem; border: 1px solid #0366d6; border-radius: 6px; font-weight: 600; }
    .lang-grid a:hover { background: #0366d6; color: #fff; text-decoration: none; }
    .site-footer { margin-top: 2.5rem; padding-top: 1rem; border-top: 1px solid #eee; font-size: 0.85rem; color: #666; }
  </style>
</head>

    <p>Google, Google Docs, Google Drive, Google AI Studio, and Gemini are trademarks of Google LLC.</p>
    <p>Support: <a href="mailto:geneascript.support@gmail.com">geneascript.support@gmail.com</a></p>

</body>
</html>
